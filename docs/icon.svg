<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Download arrow -->
  <g fill="white" filter="url(#shadow)">
    <rect x="240" y="80" width="32" height="140" rx="6"/>
    <polygon points="196,200 256,270 316,200"/>
  </g>
  <!-- Play circle -->
  <g fill="none" stroke="white" stroke-width="28" stroke-linecap="round" filter="url(#shadow)">
    <path d="M 170,290 A 110,110 0 1,0 342,290" />
  </g>
  <!-- Play triangle -->
  <polygon points="230,310 230,400 310,355" fill="white" filter="url(#shadow)"/>
</svg>
